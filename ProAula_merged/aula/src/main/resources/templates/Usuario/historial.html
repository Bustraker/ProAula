<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Viajes - Bustraker</title>
    <link rel="stylesheet" th:href="@{/css/style_dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-inner">
            <div class="logo">
                <img th:src="@{/images/Bus_icono.png}" alt="Logo Bustraker">
                <span class="brand">Bustraker</span>
            </div>
            <nav class="main-nav">
                <a th:href="@{/dashboard}" class="nav-link">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a th:href="@{/perfil}" class="nav-link">
                    <i class="fas fa-user"></i> Perfil
                </a>
                <a th:href="@{/rutas}" class="nav-link">
                    <i class="fas fa-route"></i> Rutas
                </a>
                <a th:href="@{/historial}" class="nav-link">
                    <i class="fas fa-history"></i> Historial
                </a>
                <a th:href="@{/viajar}" class="nav-link">
                    <i class="fas fa-bus"></i> Viajar
                </a>
                <a th:href="@{/logout}" class="nav-link nav-link--outline">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </nav>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="container">
        <div class="content-wrapper-inner">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-list"></i> Mis Viajes Recientes</h3>
                        <div class="card-actions">
                            <span class="total-count" th:text="'Mostrando ' + ${#lists.size(viajes)} + ' viaje(s)'">Mostrando 0 viajes</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Estado vacío: solo se muestra si no hay viajes -->
                        <div th:if="${#lists.isEmpty(viajes)}" class="empty-state">
                            <i class="fas fa-bus"></i>
                            <h4>Aún no has realizado ningún viaje</h4>
                            <p>Explora nuestras rutas disponibles usando la opción "Viajar" en el menú.</p>
                            <a th:href="@{/viajar}" class="btn btn-primary">
                                <i class="fas fa-route"></i> Consultar rutas
                            </a>
                        </div>

                        <!-- Tabla de viajes: se muestra cuando hay datos -->
                        <div th:if="${not #lists.isEmpty(viajes)}" class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Ruta</th>
                                        <th>Fecha</th>
                                        <th>Hora</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="viaje : ${viajes}">
                                        <td th:text="'#' + ${viaje.id}">-</td>
                                        <td th:text="${viaje.nombreRuta}">-</td>
                                        <td th:text="${#temporals.format(viaje.fecha, 'dd/MM/yyyy')}">-</td>
                                        <td th:text="${#temporals.format(viaje.hora, 'hh:mm a')}">-</td>
                                        <td>
                                            <span th:text="${viaje.estado}"
                                                  th:classappend="${viaje.estado == 'Completado'} ? 'badge badge-success' : (${viaje.estado == 'Cancelado'} ? 'badge badge-danger' : 'badge badge-warning')">
                                            </span>
                                        </td>
                                        <td>
                                            <a th:href="@{/historial/{id}(id=${viaje.id})}" class="btn btn-sm btn-primary">
                                                <i class="fas fa-eye"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

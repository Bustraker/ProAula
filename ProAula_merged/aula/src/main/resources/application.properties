# === BASE DE DATOS MySQL ===
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bustraker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# === JPA / Hibernate ===
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# FIX: evitar warnings de lazy loading fuera de sesión
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# === Thymeleaf ===
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# === Sesión HTTP ===
server.servlet.session.cookie.domain=localhost
server.servlet.session.cookie.path=/
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.servlet.session.tracking-modes=cookie
server.servlet.session.persistent=true
server.servlet.session.cookie.max-age=1800
server.servlet.session.cookie.name=BustrakerSession

# === Servidor ===
server.port=3409

# FIX: encoding UTF-8 para respuestas (evita caracteres corruptos en español)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# === Actuator ===
management.endpoints.jmx.enabled=false
management.endpoints.web.exposure.include=health,info

# === JWT ===
jwt.secret=change-this-secret-to-a-strong-long-value1234567890
jwt.expiration-ms=86400000

# === OAuth2 social login ===
# Configure Google or GitHub only if you have valid OAuth2 credentials.
# These placeholder values prevent startup failure but must be replaced with real credentials
# before enabling social login in production.
spring.security.oauth2.client.registration.google.client-id=placeholder-google-client-id
spring.security.oauth2.client.registration.google.client-secret=placeholder-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=placeholder-github-client-id
spring.security.oauth2.client.registration.github.client-secret=placeholder-github-client-secret
spring.security.oauth2.client.registration.github.scope=user:email

spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id
